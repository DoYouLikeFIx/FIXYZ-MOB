name: ci-mobile

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    name: validate (node-${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MOB
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: MOB/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Bundle dry-run
        run: npm run bundle:dry-run

  ci-mobile:
    name: ci-mobile
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Required check gate
        run: echo "ci-mobile checks passed"
