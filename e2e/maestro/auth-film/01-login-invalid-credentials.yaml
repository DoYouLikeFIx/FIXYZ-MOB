appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: demo@fix.com
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: wrong-password
- pressKey: Enter
- extendedWaitUntil:
    visible: "로그인 오류"
    timeout: 10000
- assertVisible:
    id: login-submit
