appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobQaPlaintextPasswords: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- inputText: mfa-verify@fix.com
- pressKey: Enter
- tapOn:
    id: login-open-password-recovery
- extendedWaitUntil:
    visible:
      id: forgot-password-email
    timeout: 10000
- tapOn:
    id: forgot-password-email
- inputText: mfa-verify@fix.com
- pressKey: Enter
- tapOn:
    id: forgot-password-submit
- extendedWaitUntil:
    visible:
      id: forgot-password-accepted
    timeout: 10000
- tapOn:
    id: forgot-password-bootstrap-challenge
- extendedWaitUntil:
    visible:
      id: forgot-password-challenge-state
    timeout: 10000
- tapOn:
    id: forgot-password-challenge-answer
- inputText: ready
- pressKey: Enter
- tapOn:
    id: forgot-password-submit
- extendedWaitUntil:
    visible:
      id: forgot-password-accepted
    timeout: 10000
- tapOn:
    id: forgot-password-challenge-answer
- scrollUntilVisible:
    element:
      id: forgot-password-open-reset
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 20
- tapOn:
    id: forgot-password-open-reset
- extendedWaitUntil:
    visible:
      id: reset-password-token
    timeout: 10000
- tapOn:
    id: reset-password-token
- inputText: valid-reset-token
- pressKey: Enter
- tapOn:
    id: reset-password-new-password
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    id: reset-password-submit
- extendedWaitUntil:
    visible: "비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요."
    timeout: 10000
- assertVisible:
    id: login-submit
- tapOn:
    id: login-email
- inputText: mfa-verify@fix.com
- pressKey: Enter
- tapOn:
    id: login-password
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    id: login-submit
- extendedWaitUntil:
    visible:
      id: login-mfa-input
    timeout: 10000
- tapOn:
    id: login-mfa-input
- inputText: 123456
- pressKey: Enter
- tapOn:
    id: login-mfa-submit
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 10000
