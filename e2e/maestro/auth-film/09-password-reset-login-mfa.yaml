appId: org.reactjs.native.example.FIXYZMob
---
- tapOn:
    text: 열기
    optional: true
- extendedWaitUntil:
    visible:
      id: reset-password-submit
    timeout: 15000
- tapOn:
    id: reset-password-new-password
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    id: reset-password-submit
- extendedWaitUntil:
    visible: "비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요."
    timeout: 10000
- assertVisible:
    id: login-submit
- tapOn:
    id: login-email
- inputText: mfa-verify@fix.com
- pressKey: Enter
- tapOn:
    id: login-password
- inputText: Test1234!
- pressKey: Enter
- extendedWaitUntil:
    visible: "인증 완료"
    timeout: 10000
- tapOn:
    text: "6자리 코드"
- inputText: 123456
- pressKey: Enter
- tapOn:
    text: "인증 완료"
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 10000
