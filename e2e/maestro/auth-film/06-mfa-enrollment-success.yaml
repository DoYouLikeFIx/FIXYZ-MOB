appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobQaPlaintextPasswords: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: mfa-enroll@fix.com
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: totp-enroll-manual-key
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    id: totp-enroll-open-authenticator
- tapOn:
    id: totp-enroll-code
- inputText: 123456
- waitForAnimationToEnd:
    timeout: 1000
- tapOn: "Google Authenticator를 연결해 주세요"
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "등록 완료"
- waitForAnimationToEnd:
    timeout: 700
- tapOn:
    text: "등록 완료"
    optional: true
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 2000
