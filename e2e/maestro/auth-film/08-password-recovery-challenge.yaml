appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobQaPlaintextPasswords: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- inputText: mfa-verify@fix.com
- pressKey: Enter
- tapOn:
    id: login-open-password-recovery
- extendedWaitUntil:
    visible:
      id: forgot-password-email
    timeout: 10000
- tapOn:
    id: forgot-password-email
- inputText: mfa-verify@fix.com
- pressKey: Enter
- tapOn:
    id: forgot-password-submit
- extendedWaitUntil:
    visible:
      id: forgot-password-accepted
    timeout: 10000
- tapOn:
    id: forgot-password-bootstrap-challenge
- extendedWaitUntil:
    visible:
      id: forgot-password-challenge-state
    timeout: 10000
- tapOn:
    id: forgot-password-challenge-answer
- inputText: ready
- pressKey: Enter
- tapOn:
    id: forgot-password-submit
- extendedWaitUntil:
    visible:
      id: forgot-password-accepted
    timeout: 10000
