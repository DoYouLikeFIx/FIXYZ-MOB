appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobHideDevWarningsOverlay: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: mfa-verify@fix.com
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- tapOn:
    id: login-submit
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: login-mfa-input
    timeout: 20000
- tapOn:
    id: login-mfa-input
- inputText: 123456
- pressKey: Enter
- tapOn:
    id: login-mfa-submit
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- scrollUntilVisible:
    element:
      id: mobile-order-input-qty
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
- tapOn:
    point: "95%,95%"
- swipe:
    start: "50%,80%"
    end: "50%,40%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- assertVisible:
    id: mobile-order-session-create
- tapOn:
    id: mobile-order-session-create
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1800
- extendedWaitUntil:
    visible:
      id: mobile-order-session-summary
    timeout: 15000
- swipe:
    start: "50%,80%"
    end: "50%,35%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- assertVisible:
    id: mobile-order-session-execute
- tapOn:
    id: mobile-order-session-execute
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1800
- extendedWaitUntil:
    visible:
      id: mobile-order-session-feedback
    timeout: 15000
- assertVisible:
    id: mobile-order-session-feedback
