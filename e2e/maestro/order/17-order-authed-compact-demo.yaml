appId: org.reactjs.native.example.FIXYZMob
---
- assertVisible:
    id: mobile-order-session-create
- scrollUntilVisible:
    element:
      id: mobile-order-session-create
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
    centerElement: true
- waitForAnimationToEnd:
    timeout: 600
- tapOn:
    id: mobile-order-session-create
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible:
      id: mobile-order-session-execute
    timeout: 15000
- waitForAnimationToEnd:
    timeout: 1200
- scrollUntilVisible:
    element:
      id: mobile-order-session-execute
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
    centerElement: true
- assertVisible:
    id: mobile-order-session-summary
- assertVisible:
    id: mobile-order-session-authorization
- tapOn:
    id: mobile-order-session-execute
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1800
- extendedWaitUntil:
    visible:
      id: mobile-order-session-result-body
    timeout: 15000
- assertVisible:
    id: mobile-order-session-result-body
