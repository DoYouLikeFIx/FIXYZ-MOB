appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobHideDevWarningsOverlay: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${MOB_DEMO_EMAIL}
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${MOB_DEMO_PASSWORD}
- tapOn:
    id: login-submit
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: login-mfa-input
    timeout: 20000
- tapOn:
    id: login-mfa-input
- inputText: ${MOB_DEMO_OTP_CODE}
- pressKey: Enter
- tapOn:
    id: login-mfa-submit
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-source-mode
    timeout: 20000
- assertVisible:
    id: mobile-dashboard-market-price
- assertVisible:
    id: mobile-dashboard-quote-source-mode
    text: LIVE
- tapOn:
    id: mobile-symbol-000660
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-source-mode
      text: DELAYED
    timeout: 10000
- tapOn:
    id: mobile-symbol-035420
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-source-mode
      text: REPLAY
    timeout: 10000
- swipe:
    start: "50%,84%"
    end: "50%,24%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- swipe:
    start: "50%,84%"
    end: "50%,24%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- swipe:
    start: "50%,84%"
    end: "50%,24%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- extendedWaitUntil:
    visible:
      id: mobile-external-order-preset-krx-market-buy-3
    timeout: 10000
- tapOn:
    id: mobile-external-order-preset-krx-market-buy-3
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1500
- swipe:
    start: "50%,80%"
    end: "50%,30%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- tapOn:
    id: mobile-order-session-create
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1800
- extendedWaitUntil:
    visible:
      id: mobile-order-session-stale-quote-guidance
    timeout: 15000
- assertVisible:
    id: mobile-order-session-stale-quote-guidance
