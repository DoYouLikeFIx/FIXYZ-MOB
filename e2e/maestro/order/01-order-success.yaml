appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: demo@fix.com
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- scrollUntilVisible:
    element:
      id: mobile-external-order-submit
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- tapOn:
    id: mobile-external-order-submit
- extendedWaitUntil:
    visible: "주문 요청이 접수되었습니다. 상태: RECEIVED"
    timeout: 15000
- assertVisible:
    id: mobile-external-order-feedback
- assertVisible:
    id: mobile-external-order-clear
- assertNotVisible:
    id: external-order-error-card
