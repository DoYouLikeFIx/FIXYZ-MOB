appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobHideDevWarningsOverlay: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- inputText: pending-order@fix.com
- tapOn:
    id: login-password
- inputText: Test1234!
- tapOn:
    id: login-submit
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: login-mfa-input
    timeout: 20000
- tapOn:
    id: login-mfa-input
- inputText: 123456
- pressKey: Enter
- tapOn:
    id: login-mfa-submit
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- scrollUntilVisible:
    element:
      id: mobile-order-session-title
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 40
    centerElement: true
- assertVisible:
    id: mobile-order-session-title
