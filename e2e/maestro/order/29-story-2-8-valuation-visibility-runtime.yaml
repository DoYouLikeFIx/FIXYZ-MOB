appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobHideDevWarningsOverlay: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${MOB_DEMO_EMAIL}
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${MOB_DEMO_PASSWORD}
- tapOn:
    id: login-submit
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: login-mfa-input
    timeout: 20000
- tapOn:
    id: login-mfa-input
- inputText: ${MOB_DEMO_OTP_CODE}
- pressKey: Enter
- tapOn:
    id: login-mfa-submit
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-ticker
    timeout: 30000
- assertVisible:
    id: mobile-dashboard-quote-ticker-price
    text: "₩70,100"
- assertVisible:
    id: mobile-dashboard-quote-ticker-mode
    text: LIVE
- assertVisible:
    id: mobile-dashboard-quote-ticker-state
    text: 직결 시세
- assertVisible:
    id: mobile-dashboard-quote-ticker-status-note
    text: 실시간 기준
- scrollUntilVisible:
    element:
      id: mobile-dashboard-valuation-status
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- assertVisible:
    id: mobile-dashboard-valuation-status
    text: 평가 가능
- assertVisible:
    id: mobile-dashboard-avg-price
    text: "₩68,900"
- assertVisible:
    id: mobile-dashboard-unrealized-pnl
    text: "+₩144,000"
- scrollUntilVisible:
    element:
      id: mobile-symbol-000660
    direction: UP
    timeout: 15000
    visibilityPercentage: 60
    centerElement: true
- waitForAnimationToEnd:
    timeout: 1800
- tapOn:
    id: mobile-symbol-000660
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1800
- extendedWaitUntil:
    visible: "현재 조회 종목 000660"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 1800
- scrollUntilVisible:
    element:
      id: mobile-dashboard-valuation-status
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- assertVisible:
    id: mobile-dashboard-valuation-status
    text: 시세 지연
- assertVisible:
    id: mobile-dashboard-market-price
    text: 확인 불가
- assertVisible:
    id: mobile-dashboard-unrealized-pnl
    text: 확인 불가
- assertVisible:
    id: mobile-dashboard-quote-source-mode
    text: DELAYED
- assertVisible:
    id: mobile-dashboard-valuation-guidance
- scrollUntilVisible:
    element:
      id: mobile-symbol-035420
    direction: UP
    timeout: 15000
    visibilityPercentage: 60
    centerElement: true
- waitForAnimationToEnd:
    timeout: 1800
- tapOn:
    id: mobile-symbol-035420
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1800
- extendedWaitUntil:
    visible: "현재 조회 종목 035420"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 1800
- scrollUntilVisible:
    element:
      id: mobile-dashboard-valuation-status
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- assertVisible:
    id: mobile-dashboard-valuation-status
    text: 평가 불가
- assertVisible:
    id: mobile-dashboard-market-price
    text: 확인 불가
- assertVisible:
    id: mobile-dashboard-quote-as-of
    text: 확인 불가
- assertVisible:
    id: mobile-dashboard-quote-source-mode
    text: 확인 불가
- assertVisible:
    id: mobile-dashboard-valuation-guidance
- scrollUntilVisible:
    element:
      id: mobile-dashboard-quote-ticker-guidance
    direction: UP
    timeout: 10000
    visibilityPercentage: 20
    centerElement: true
- assertVisible:
    id: mobile-dashboard-quote-ticker-guidance
- assertVisible:
    id: mobile-dashboard-quote-ticker-chart
- swipe:
    start: "50%,84%"
    end: "50%,24%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- swipe:
    start: "50%,84%"
    end: "50%,24%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- swipe:
    start: "50%,84%"
    end: "50%,24%"
    duration: 500
    waitToSettleTimeoutMs: 1200
- extendedWaitUntil:
    visible:
      id: mobile-external-order-preset-krx-market-buy-3
    timeout: 10000
- tapOn:
    id: mobile-external-order-preset-krx-market-buy-3
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible:
      id: mobile-market-order-live-ticker
    timeout: 10000
- assertVisible:
    id: mobile-market-order-live-ticker-price
    text: "₩70,100"
- assertVisible:
    id: mobile-market-order-live-ticker-source-mode
    text: LIVE
- assertVisible:
    id: mobile-market-order-live-ticker-valuation-status
    text: 평가 가능
- assertVisible: "5초마다 자동 갱신"
- waitForAnimationToEnd:
    timeout: 2600
