appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18081
      mobDisableAnimations: true
      mobHideDevWarningsOverlay: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${MOB_DEMO_EMAIL}
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${MOB_DEMO_PASSWORD}
- tapOn:
    id: login-submit
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: login-mfa-input
    timeout: 20000
- tapOn:
    id: login-mfa-input
- inputText: ${MOB_DEMO_OTP_CODE}
- pressKey: Enter
- tapOn:
    id: login-mfa-submit
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-ticker
    timeout: 20000
- assertVisible:
    id: mobile-dashboard-quote-ticker
- assertVisible:
    id: mobile-dashboard-quote-ticker-price
- assertVisible:
    id: mobile-dashboard-quote-ticker-mode
- assertVisible:
    id: mobile-dashboard-quote-ticker-state
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: mobile-symbol-000660
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-ticker-mode
      text: DELAYED
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: mobile-symbol-035420
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-ticker-mode
      text: REPLAY
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: mobile-symbol-005930
- extendedWaitUntil:
    visible:
      id: mobile-dashboard-quote-ticker-mode
      text: LIVE
    timeout: 10000
- swipe:
    start: "50%,72%"
    end: "50%,40%"
    duration: 500
    waitToSettleTimeoutMs: 1400
- assertVisible:
    id: mobile-dashboard-quote-ticker-chart
- waitForAnimationToEnd:
    timeout: 2600
