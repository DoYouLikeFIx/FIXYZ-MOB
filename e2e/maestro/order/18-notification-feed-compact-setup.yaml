appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: demo@fix.com
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- tapOn:
    id: login-submit
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- scrollUntilVisible:
    element:
      id: mobile-notification-connection
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
    centerElement: true
- assertVisible:
    id: mobile-notification-connection
