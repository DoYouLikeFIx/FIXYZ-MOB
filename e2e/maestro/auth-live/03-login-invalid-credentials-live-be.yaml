appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: ${LIVE_API_BASE_URL}
      mobDisableAnimations: true
- extendedWaitUntil:
    visible:
      id: login-email
    timeout: 20000
- tapOn:
    id: login-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_EMAIL}
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_INVALID_PASSWORD}
- pressKey: Enter
- extendedWaitUntil:
    visible: "이메일 또는 비밀번호가 올바르지 않습니다."
    timeout: 10000
- assertVisible:
    id: login-submit
