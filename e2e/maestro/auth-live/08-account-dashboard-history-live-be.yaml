appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: ${LIVE_API_BASE_URL}
      mobDisableAnimations: true
- extendedWaitUntil:
    visible: "새 계정 만들기"
    timeout: 20000
- tapOn: "새 계정 만들기"
- extendedWaitUntil:
    visible:
      id: register-email
    timeout: 10000
- tapOn:
    id: register-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_EMAIL}
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: register-name
    timeout: 10000
- tapOn:
    id: register-name
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_NAME}
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: register-password
    timeout: 10000
- tapOn:
    id: register-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_PASSWORD}
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: register-password-confirm
    timeout: 10000
- tapOn:
    id: register-password-confirm
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_PASSWORD}
- pressKey: Enter
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- scrollUntilVisible:
    element:
      id: mobile-masked-account
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- assertVisible:
    id: mobile-masked-account
- assertNotVisible:
    id: mobile-symbol-error
- assertNotVisible:
    id: mobile-dashboard-error
- assertVisible:
    id: mobile-dashboard-balance
- assertNotVisible:
    id: mobile-history-error
- scrollUntilVisible:
    element:
      id: mobile-history-empty
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- assertVisible:
    id: mobile-history-empty
