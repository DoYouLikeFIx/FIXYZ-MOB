appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: ${LIVE_API_BASE_URL}
      mobDisableAnimations: true
      mobHideDevWarningsOverlay: true
- extendedWaitUntil:
    visible:
      id: login-open-password-recovery
    timeout: 20000
- tapOn:
    id: login-open-password-recovery
- extendedWaitUntil:
    visible:
      id: forgot-password-email
    timeout: 10000
- tapOn:
    id: forgot-password-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_EMAIL}
- pressKey: Enter
- tapOn:
    id: forgot-password-submit
- extendedWaitUntil:
    visible:
      id: forgot-password-accepted
    timeout: 10000
- tapOn:
    id: forgot-password-bootstrap-challenge
- extendedWaitUntil:
    visible:
      id: forgot-password-challenge-state
    timeout: 10000
- extendedWaitUntil:
    visible: "상태: 계산 완료"
    timeout: 10000
- swipe:
    start: "50%,74%"
    end: "50%,58%"
    duration: 400
    waitToSettleTimeoutMs: 1200
- swipe:
    start: "50%,74%"
    end: "50%,58%"
    duration: 400
    waitToSettleTimeoutMs: 1200
- tapOn:
    id: forgot-password-submit
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1500
- assertVisible:
    id: forgot-password-accepted
