appId: org.reactjs.native.example.FIXYZMob
---
- tapOn:
    text: 열기
    optional: true
- extendedWaitUntil:
    visible:
      id: reset-password-submit
    timeout: 15000
- tapOn:
    id: reset-password-new-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ${LIVE_RESET_PASSWORD}
- pressKey: Enter
- tapOn:
    id: reset-password-submit
- extendedWaitUntil:
    visible: "비밀번호가 변경되었습니다. 새 비밀번호로 로그인해 주세요."
    timeout: 10000
- assertVisible:
    id: login-submit
