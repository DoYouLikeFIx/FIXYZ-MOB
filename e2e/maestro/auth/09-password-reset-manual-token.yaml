appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobQaPlaintextPasswords: true
- extendedWaitUntil:
    visible:
      id: login-open-password-recovery
    timeout: 20000
- tapOn:
    id: login-open-password-recovery
- extendedWaitUntil:
    visible:
      id: forgot-password-open-reset
    timeout: 10000
- tapOn:
    id: forgot-password-open-reset
- extendedWaitUntil:
    visible:
      id: reset-password-token
    timeout: 10000
- tapOn:
    id: reset-password-token
- waitForAnimationToEnd:
    timeout: 5000
- inputText: demo-reset-token
- pressKey: Enter
- tapOn:
    id: reset-password-new-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    id: reset-password-submit
- extendedWaitUntil:
    visible: "재설정 링크가 유효하지 않거나 만료되었습니다. 비밀번호 재설정을 다시 요청해 주세요."
    timeout: 10000
- assertVisible:
    id: reset-password-submit
