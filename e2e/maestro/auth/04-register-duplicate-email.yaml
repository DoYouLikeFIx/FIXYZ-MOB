appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
- extendedWaitUntil:
    visible: "새 계정 만들기"
    timeout: 20000
- tapOn: "새 계정 만들기"
- extendedWaitUntil:
    visible:
      id: register-email
    timeout: 10000
- tapOn:
    id: register-email
- waitForAnimationToEnd:
    timeout: 5000
- inputText: taken-user@fix.com
- pressKey: Enter
- tapOn:
    id: register-name
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Taken User
- pressKey: Enter
- tapOn:
    id: register-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    id: register-password-confirm
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- pressKey: Enter
- extendedWaitUntil:
    visible: "이미 가입된 이메일입니다. 다른 이메일을 입력해 주세요."
    timeout: 10000
- assertVisible:
    id: register-email
