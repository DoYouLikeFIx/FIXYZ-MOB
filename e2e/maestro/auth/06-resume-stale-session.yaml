appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
- extendedWaitUntil:
    visible:
      id: login-username
    timeout: 20000
- tapOn:
    id: login-username
- waitForAnimationToEnd:
    timeout: 5000
- inputText: stale_resume
- tapOn:
    id: login-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: Test1234!
- pressKey: Enter
- tapOn:
    text: "지금 안 함"
    optional: true
- extendedWaitUntil:
    visible:
      id: protected-area-title
    timeout: 20000
- scrollUntilVisible:
    element:
      id: session-refresh-button
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 60
- launchApp:
    appId: com.apple.Preferences
- launchApp:
    appId: org.reactjs.native.example.FIXYZMob
    stopApp: false
- extendedWaitUntil:
    visible: "세션이 만료되었습니다. 다시 로그인해 주세요."
    timeout: 15000
- assertVisible:
    id: login-submit
