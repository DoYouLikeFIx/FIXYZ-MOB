appId: org.reactjs.native.example.FIXYZMob
---
- launchApp:
    clearState: true
    clearKeychain: true
    arguments:
      mobApiBaseUrl: http://localhost:18080
      mobDisableAnimations: true
      mobQaPlaintextPasswords: true
- extendedWaitUntil:
    visible:
      id: login-open-password-recovery
    timeout: 20000
- tapOn:
    id: login-open-password-recovery
- extendedWaitUntil:
    visible:
      id: forgot-password-open-reset
    timeout: 10000
- tapOn:
    id: forgot-password-open-reset
- extendedWaitUntil:
    visible:
      id: reset-password-token
    timeout: 10000
- tapOn:
    id: reset-password-token
- waitForAnimationToEnd:
    timeout: 5000
- inputText: csrf-terminal-token
- pressKey: Enter
- tapOn:
    id: reset-password-new-password
- waitForAnimationToEnd:
    timeout: 5000
- inputText: ResetPass1!
- pressKey: Enter
- tapOn:
    id: reset-password-submit
- extendedWaitUntil:
    visible: "Unexpected server response. Please try again."
    timeout: 10000
- assertVisible:
    id: reset-password-submit
